<!DOCTYPE html>
<html>
<head>
    <title>Create Job</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/create">Create Job</a>
        <a href="/jobs">View Jobs</a>
        <a href="/health">Health</a>
    </div>

    <h1>Create New Job</h1>
    <form method="POST">
        <div class="form-group">
            <label for="job_id">Job ID (UUID):</label>
            <input type="text" id="job_id" name="job_id" value="{{ job_id }}">
        </div>
        <div class="form-group">
            <label for="creator">Creator:</label>
            <input type="text" id="creator" name="creator" required>
        </div>
        <div class="form-group">
            <label for="process_time">Process Time (seconds):</label>
            <input type="number" id="process_time" name="process_time" min="1" required>
        </div>
        <button type="submit">Create Job</button>
    </form>
</body>
</html>
